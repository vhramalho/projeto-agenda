<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatórios</title>

    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/relatorio.css" />
  </head>

  <body>
    <main class="pagina-relatorio">
      <section class="relatorio-topo">
        <a href="index.html" class="botao-voltar-relatorio">←</a>

        <div>
          <h1>Relatórios</h1>
        </div>

        <button id="btnCalendario" class="botao-calendario-relatorio">
          📅
        </button>
      </section>

      <section class="abas-periodo">
        <button class="aba-periodo ativa" data-periodo="dia">Dia</button>
        <button class="aba-periodo" data-periodo="semana">Semana</button>
        <button class="aba-periodo" data-periodo="mes">Mês</button>
        <button class="aba-periodo" data-periodo="ano">Ano</button>
      </section>

      <section class="periodo-selecionado">
        <button id="btnPeriodoAnterior" class="btn-periodo">‹</button>

        <div class="info-periodo">
          <strong id="textoPeriodoSelecionado">Hoje</strong>
          <span id="subtituloPeriodo"></span>
        </div>

        <button id="btnPeriodoSeguinte" class="btn-periodo">›</button>
      </section>

      <section class="card-grafico">
        <div class="card-titulo">
          <div>
            <span>Faturamento</span>
            <h2 id="faturamentoPeriodo">R$ 0,00</h2>
            <span id="variacaoFaturamento" class="variacao-card"></span>
          </div>
        </div>

        <div id="graficoFaturamento" class="grafico-faturamento"></div>

        <div
          id="valorSelecionadoGrafico"
          class="valor-selecionado-grafico"
        ></div>
      </section>

      <section class="grade-kpis principal-kpis">
        <article class="mini-card">
          <span>Atendimentos</span>
          <strong id="totalAtendimentos">0</strong>
          <span id="variacaoAtendimentos" class="variacao-card"></span>
        </article>

        <article class="mini-card">
          <span>Ticket médio</span>
          <strong id="ticketMedio">R$ 0,00</strong>
          <span id="variacaoTicketMedio" class="variacao-card"></span>
        </article>

        <article class="mini-card">
          <span id="labelDiasAtendidos">Dias atendidos</span>
          <strong id="diasAtendidos">0</strong>
          <span class="variacao-card variacao-vazia"></span>
        </article>

        <article class="mini-card">
          <span id="labelMediaPeriodo">Média por dia</span>
          <strong id="mediaPeriodo">R$ 0,00</strong>
          <span id="variacaoMediaPeriodo" class="variacao-card"></span>
        </article>
      </section>

      <article class="card-recebimentos">
        <div class="card-titulo">
          <span>Recebimentos</span>
        </div>

        <div class="recebimentos-layout">
          <div id="recebimentoDetalhado" class="recebimentos-lista">
            <!-- Formas de pagamento -->
          </div>

          <div
            id="graficoPizzaRecebimentos"
            class="grafico-pizza-recebimentos"
          ></div>
        </div>
      </article>

      <article class="card-servicos">
        <div class="card-titulo">
          <span>Serviços</span>
          <h2 id="totalServicosRealizados">0</h2>
        </div>

        <div id="listaServicosRealizados" class="lista-servicos">
          <!-- Serviços gerados pelo JavaScript -->
        </div>
      </article>

      <section class="grade-kpis">
        <article class="mini-card">
          <span>Taxa cartão</span>
          <strong id="taxaCartao">R$ 0,00</strong>
        </article>

        <article class="mini-card">
          <span>Pendente</span>
          <strong id="valorPendente">R$ 0,00</strong>
        </article>
      </section>
    </main>

    <!-- Modal de Calendário -->
    <div id="modal-calendario" class="modal-calendario">
      <div class="calendario-container">
        <div class="calendario-topo">
          <button id="mesAnterior" class="cal-btn">‹</button>
          <span id="mesAtual" class="cal-mes">Julho 2025</span>
          <button id="mesSeguinte" class="cal-btn">›</button>
        </div>

        <div class="calendario-semana">
          <div>Dom</div>
          <div>Seg</div>
          <div>Ter</div>
          <div>Qua</div>
          <div>Qui</div>
          <div>Sex</div>
          <div>Sáb</div>
        </div>

        <div class="calendario-corpo" id="calendarioCorpo">
          <!-- Dias inseridos por JS -->
        </div>
      </div>
    </div>
    <a href="index.html">agenda</a>
    <script src="javaScript/relatorio.js"></script>
  </body>
</html>
