<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intervalos e Bloqueios</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/paginas.css" />
    <link rel="stylesheet" href="css/intervalos.css" />
  </head>

  <body>
    <main class="pagina-secundaria">
      <section class="topo-pagina topo-pagina-com-acao">
        <div>
          <h1>Intervalos</h1>
          <p>Crie bloqueios fixos e horários indisponíveis.</p>
        </div>

        <button
          class="botao-topo-mais"
          id="btnAbrirModal"
          type="button"
        >
          +
        </button>
      </section>

      <div id="lista-intervalos" class="lista-pagina">
        <!-- Os bloqueios aparecerão aqui -->
      </div>
    </main>

    <!-- Modal criar/editar -->
    <div id="modalIntervalo" class="modal">
      <h2>Bloqueio</h2>

      <input
        type="text"
        id="nomeIntervalo"
        placeholder="Nome opcional. Ex: Almoço"
      />

      <p class="texto-horarios">Selecione os horários:</p>

      <div id="listaHorarios" class="lista-horarios">
        <!-- Horários aparecem via JS -->
      </div>

      <p class="texto-horarios">Repetir em:</p>

      <div id="listaDiasSemana" class="lista-dias-semana">
        <label class="dia-opcao">
          <input type="checkbox" value="0" />
          Dom
        </label>

        <label class="dia-opcao">
          <input type="checkbox" value="1" />
          Seg
        </label>

        <label class="dia-opcao">
          <input type="checkbox" value="2" />
          Ter
        </label>

        <label class="dia-opcao">
          <input type="checkbox" value="3" />
          Qua
        </label>

        <label class="dia-opcao">
          <input type="checkbox" value="4" />
          Qui
        </label>

        <label class="dia-opcao">
          <input type="checkbox" value="5" />
          Sex
        </label>

        <label class="dia-opcao">
          <input type="checkbox" value="6" />
          Sáb
        </label>
      </div>

      <div class="botoes-modal">
        <button class="btn-transparente" id="btnFecharModal">Voltar</button>
        <button class="btn-verde" id="btnConfirmar">Confirmar</button>
      </div>
    </div>

    <!-- Modal opções -->
    <div id="modalOpcoes" class="modal">
      <h2>O que deseja fazer?</h2>

      <div class="botoes-opcoes">
        <button class="btn-verde" id="btnEditar">Editar</button>
        <button class="btn-vermelho" id="btnExcluir">Excluir</button>
      </div>
    </div>

    <!-- Modal confirmar exclusão -->
    <div id="modalConfirmarExclusao" class="modal">
      <h2>Deseja realmente excluir?</h2>

      <div class="botoes-modal">
        <button class="btn-transparente" id="btnCancelarExclusao">
          Voltar
        </button>
        <button class="btn-verde" id="btnConfirmarExclusao">Confirmar</button>
      </div>
    </div>
    <div id="fundoEscuro" class="fundo-escuro"></div>

    <a href="index.html">agenda</a>
    <script src="javaScript/intervalos.js"></script>
    <script src="javaScript/menu.js"></script>
  </body>
</html>
