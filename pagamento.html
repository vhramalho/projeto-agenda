<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formas de Pagamento</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/paginas.css" />
    <link rel="stylesheet" href="css/pagamento.css" />
  </head>

  <body>
    <main class="pagina-secundaria">
      <section class="topo-pagina topo-pagina-com-acao">
        <div>
          <h1>Pagamentos</h1>
          <p>Cadastre e edite as formas de pagamento.</p>
        </div>

        <button class="botao-topo-mais" id="btnAbrirModal" type="button">
          +
        </button>
      </section>

      <div id="lista-pagamentos" class="lista-pagina">
        <!-- Itens aparecerão aqui -->
      </div>

    </main>

    <!-- Modal principal para adicionar ou editar -->
    <div id="fundoEscuro" class="fundo-escuro"></div>
    <div id="modalPagamento" class="modal">
      <h2>Forma</h2>
      <input type="text" id="nomePagamento" placeholder="Nome da forma" />
      <input
        type="number"
        id="taxaPagamento"
        placeholder="Taxa (%) - opcional"
      />
      <div class="botoes-modal">
        <button class="btn-transparente" id="btnFecharModal">Voltar</button>
        <button class="btn-verde" id="btnConfirmar">Confirmar</button>
      </div>
    </div>

    <!-- Modal opções -->
    <div id="modalOpcoes" class="modal">
      <h2>O que deseja fazer?</h2>

      <div class="botoes-opcoes">
        <button class="btn-verde" id="btnEditar">Editar</button>
        <button class="btn-vermelho" id="btnExcluir">Excluir</button>
      </div>
    </div>

    <!-- Modal de confirmação de exclusão (caso use futuramente) -->
    <div id="modalConfirmarExclusao" class="modal">
      <h2>Deseja realmente excluir?</h2>
      <div class="botoes-modal">
        <button class="btn-transparente" id="btnCancelarExclusao">
          Voltar
        </button>
        <button class="btn-verde" id="btnConfirmarExclusao">Confirmar</button>
      </div>
    </div>
<a href="index.html">agenda</a>
    <script src="javaScript/pagamento.js"></script>
    <script src="javaScript/menu.js"></script>
  </body>
</html>
